{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% block title %}EVNP - Base{% endblock %}</title>
    
    {% block favicon %}
        <link rel="shortcut icon" type="x-icon" href="">
    {% endblock %}
    <link href="{% static 'src/output.css' %}" rel="stylesheet">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- Font CSS -->
    <link rel="stylesheet" href="{% static 'Design/Font/fonts.css' %}">

    <!-- Style CSS -->
     <style>
        body {
            background: white; /* page background */
            }

        .card {
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            position: relative;
        }

        .card::before {
        content: "";
        position: absolute;
        width: 300px;
        height: 300px;
        background: white; /* same as body background */
        border-radius: 50%;
        top: -100px;
        left: 50%;
        transform: translateX(-50%);
        }
     </style>
    
</head>
<body>

    {% block preload %}
        <div>


            
        </div>
    {% endblock %}
    
    {% block navbar %}
        <div class="w-full h-[10vh] flex justify-between items-center">
            <div class="w-3/10 flex justify-center items-center">
                <ul class="w-4/5 inter_Bold flex justify-start items-center text-xl gap-16">
                    <li>Home</li>
                    <li>Election</li>
                    <li>Parties</li>
                </ul>
            </div>

            <div class="w-4/10 h-full">
                {% block NavCenter %}
                    <div>
                        
                    </div>
                {% endblock %}
            </div>

            <div class="w-3/10 flex justify-evenly items-center">
                <div class="w-4/5 flex justify-end items-center gap-16">
                    <ul class="inter_Bold text-xl">
                        <li>About Us</li>
                    </ul>
                    <div>
                        <button class="w-[200px] p-2 bg-linear-to-r from-sky-950 to-sky-800 text-white text-lg inter_Bold rounded-lg">Election Result</button>
                    </div>
                </div>
            </div>
        </div>
    {% endblock %}

    {% block content %}
        <div class="w-full">



        </div>
    {% endblock %}

</body>
</html>
