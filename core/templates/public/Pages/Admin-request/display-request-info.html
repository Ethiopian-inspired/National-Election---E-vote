{% extends "public/base.html" %}
{% load static %}

{% block NavCenter %}
<div class="flex justify-center items-center gap-4">
    <div class="inter_Bold">
        <p class="text-xl">Party Request</p>
        <p class="text-3xl">Review</p>
    </div>
    <hr class="rotate-90 w-[50px] border-1">
    <div class="inter_Bold">
        <p class="text-4xl">Admin Panel</p>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="w-full h-[90vh] flex flex-col justify-start items-start p-10">
    <div class="w-full grid grid-cols-[200px_200px_200px_200px]">
        {% for data in Request_display %}
            <a href="{% url 'Request_Approvement' data.id %}">
                <div class="w-[250px] h-[300px] grid grid-flow-col grid-rows-[80%_20%] cursor-pointer bg-radial-[at_25%_25%] from-sky-800 to-sky-950 to-100% shadow-sm rounded-sm hover:shadow-xl/50 hover:scale-[1.02] transition duration-300">
                    <div class="w-full h-full flex justify-center items-center">
                        <img class="w-[200px]" src="{{ data.party_logo.url }}" alt="">
                    </div>

                    <div class="flex flex-col justify-end items-start p-2">
                        <p class="text-white text-2xl inter_Bold">{{ data.party_FullName }}</p>
                        <p class="text-white text-sm inter_Bold">{{ data.party_chairman_name }}</p>
                    </div>
                </div>
            </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
