{% load static %}

<!-- Alpine JS -->
<script src="//unpkg.com/alpinejs" defer></script>

<div x-data="{ open:false }" class="flex justify-center">

    <!-- Post Button -->
    <button 
        @click="open = true"
        class="cursor-pointer inter_Bold text-black inline-flex w-full items-center justify-center rounded-2xl bg-sky-50 px-5 py-3 transition duration-300 hover:scale-[1.01] hover:bg-sky-800 hover:text-white">
        Post
    </button>

    <!-- Modal Background -->
    <div 
        x-show="open"
        class="fixed inset-0 flex items-center justify-center bg-sky-900 bg-opacity-50"
    >

        <!-- Modal Box -->
        <div class="bg-sky-800 shadow-lg rounded-xl shadow-lg p-6 w-96">

            <h2 class="text-2xl text-dark font-bold">
                Confirm Post
            </h2>

            <p class="text-dark inter_Bold mb-6">
                Are you sure you want to publish your party?
            </p>

            <div class="flex justify-end gap-3">

                <!-- Cancel -->
                <button 
                    @click="open = false"
                    class="inter_Bold px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 text-dark">
                    Cancel
                </button>

                <!-- Post Form -->
                <form action="{% url '' %}" method="POST">
                    {% csrf_token %}
                    <button 
                        type="submit"
                        class="inter_Bold px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                        Post Now
                    </button>
                </form>

            </div>

        </div>
    </div>

</div>
