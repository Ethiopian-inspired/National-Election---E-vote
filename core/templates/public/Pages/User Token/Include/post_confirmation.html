{% load static %}

<!-- Alpine JS -->
<script src="//unpkg.com/alpinejs" defer></script>

<form action="{% url 'User_Token' token.id %}" method="post">
{% csrf_token %}
    <div x-data="{ open:false }" class="flex justify-center">

        <!-- Post Button -->
        <button 
            @click="open = true"
            class="cursor-pointer inter_Bold text-black inline-flex w-full items-center justify-center rounded-2xl bg-sky-50 px-5 py-3 transition duration-300 hover:scale-[1.01] hover:bg-sky-800 hover:text-white">
            Post
        </button>

        <!-- Modal Background -->
        <div 
            x-show="open"
            class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50"
        >

            <!-- Modal Box -->
            <div class="bg-white rounded-xl shadow-lg p-6 w-96">

                <h2 class="text-xl font-bold mb-4">
                    Confirm Post
                </h2>

                <p class="text-gray-600 mb-6">
                    Are you sure you want to publish this post?
                </p>

                <div class="flex justify-end gap-3">

                    <!-- Cancel -->
                    <button 
                        @click="open = false"
                        class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">
                        Cancel
                    </button>

                    <!-- Post Form -->
                    <form method="POST">
                        {% csrf_token %}
                        <button 
                            type="submit"
                            class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                            Post Now
                        </button>
                    </form>

                </div>

            </div>
        </div>

    </div>
</form>
